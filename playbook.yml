---
- hosts: web
  become: false

  tasks:

    - name: Build Maven
      shell: |
        cd {{ playbook_dir }}
        ./mvnw clean package -DskipTests

    - name: Run Tests
      shell: |
        cd {{ playbook_dir }}
        ./mvnw test

    - name: Deployment Success
      debug:
        msg: "Application deployed successfully"

  