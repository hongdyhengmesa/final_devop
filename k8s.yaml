apiVersion: v1
kind: Pod
metadata:
  name: web-pod
spec:
  containers:
    - name: web
      image: eclipse-temurin:21-jdk
      command: ["sleep"]
      args: ["infinity"]
      ports:
        - containerPort: 8080
        - containerPort: 8443
        - containerPort: 2222

---
apiVersion: v1
kind: Pod
metadata:
  name: mysql-pod
spec:
  containers:
    - name: mysql
      image: mysql:8.0
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: Hello@123
        - name: MYSQL_DATABASE
          value: B-hong_dyhengmesa-db
      ports:
        - containerPort: 3306