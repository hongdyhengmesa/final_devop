<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ID Card Preview</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
        }

        .card{
            width:900px;
            margin:30px auto;
            border:2px solid #333;
            border-radius:10px;
            padding:20px;
            background:white;
        }

        .header{
            text-align:center;
            margin-bottom:20px;
        }

        .content{
            display:flex;
            justify-content:space-between;
            gap:20px;
        }

        .left{
            width:180px;
            text-align:center;
        }

        .center{
            flex:1;
        }

        .right{
            width:180px;
            text-align:center;
        }

        .photo{
            width:150px;
            height:180px;
            border:1px solid #ccc;
            object-fit:cover;
        }

        .qr{
            width:150px;
            height:150px;
            border:1px solid #ccc;
            margin-top:20px;
        }

        table{
            width:100%;
        }

        td{
            padding:8px;
        }

        td:first-child{
            font-weight:bold;
            width:180px;
        }
    </style>
</head>
<body>

<div class="card">

    <div class="header">
        <h1>ID CARD</h1>
    </div>

    <div class="content">

        <!-- PHOTO -->
        <div class="left">

            <img
                    class="photo"
                    th:if="${profile.photoFileName != null}"
                    th:src="@{'/uploads/' + ${profile.photoFileName}}"
                    alt="Photo"/>

            <img
                    class="photo"
                    th:if="${profile.photoFileName == null}"
                    src="https://via.placeholder.com/150x180"
                    alt="Photo"/>

        </div>

        <!-- PROFILE INFO -->
        <div class="center">

            <table>

                <tr>
                    <td>Registration</td>
                    <td th:text="${profile.registrationNumber}"></td>
                </tr>

                <tr>
                    <td>Name</td>
                    <td th:text="${profile.fullName}"></td>
                </tr>

                <tr>
                    <td>Type</td>
                    <td th:text="${profile.type}"></td>
                </tr>

                <tr>
                    <td>Department</td>
                    <td th:text="${profile.department}"></td>
                </tr>

                <tr>
                    <td>Title</td>
                    <td th:text="${profile.title}"></td>
                </tr>

                <tr>
                    <td>Email</td>
                    <td th:text="${profile.email}"></td>
                </tr>

                <tr>
                    <td>Phone</td>
                    <td th:text="${profile.phone}"></td>
                </tr>

                <tr>
                    <td>Blood Group</td>
                    <td th:text="${profile.bloodGroup}"></td>
                </tr>

                <tr>
                    <td>Date Of Birth</td>
                    <td th:text="${profile.dateOfBirth}"></td>
                </tr>

                <tr>
                    <td>Issue Date</td>
                    <td th:text="${profile.issueDate}"></td>
                </tr>

                <tr>
                    <td>Expiry Date</td>
                    <td th:text="${profile.expiryDate}"></td>
                </tr>

            </table>

        </div>

        <!-- QR CODE -->
        <div class="right">

            <h3>QR Code</h3>

            <img
                    class="qr"
                    th:src="${qrCode}"
                    alt="QR Code"/>

        </div>

        <div class="barcode-section">
    <h3>Barcode</h3>

    <img
        th:src="@{'/uploads/barcodes/profile_' + ${profile.id} + '.png'}"
        width="300">
</div>

    </div>

</div>

</body>
</html>
